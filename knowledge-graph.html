  return location.origin + '/mcp';

// === Fetch from MCP ===
async function fetchPages() {
  // 动态 import MCP client（如果环境支持）
  // 浏览器里没有 mcp SDK，改用 fetch 直接调 streamable-http
  const resp = await fetch(MCP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MCP_TOKEN}` },
    body: JSON.stringify({
      jsonrpc: '2.0', id: 1, method: 'initialize',
      params: { protocolVersion: '2024-11-05', capabilities: {}, clientInfo: { name: 'kg-graph', version: '1.0' } }
    })
  });
  // streamable-http 需要先 initialize 再 call tool
  const sessHeader = resp.headers.get('Mcp-Session-Id') || '';
  const initBody = await resp.json();

  async function callTool(name, args) {
    const r = await fetch(MCP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MCP_TOKEN}`, 'Mcp-Session-Id': sessHeader },
      body: JSON.stringify({ jsonrpc: '2.0', id: Date.now(), method: 'tools/call', params: { name, arguments: args } })
    });
    const body = await r.json();
    if (body.error) throw new Error(JSON.stringify(body.error));
    // result.content 是数组，每个有 text 字段
    const items = [];
    if (body.result && body.result.content) {
      for (const c of body.result.content) {
        if (c.text) { try { items.push(JSON.parse(c.text)); } catch {} }
      }
    }
    return items;
  }

  // 发送 initialized 通知
  await fetch(MCP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MCP_TOKEN}`, 'Mcp-Session-Id': sessHeader },
    body: JSON.stringify({ jsonrpc: '2.0', method: 'notifications/initialized' })
  });

  const pages = await callTool('list_recent', { limit: 200 });
  return pages;
}

// === Build graph from pages ===
function buildGraph(pages) {
  PAGES = pages;
  const allTags = {};
  pages.forEach(p => { p.tags.forEach(t => { allTags[t] = (allTags[t]||0)+1; }); });

  nodes = []; links = []; nodeMap = {};
  pages.forEach((p,i) => {
    const id = "p"+i;
    const node = { id, type:"page", label:p.title, page:p, color:NODE_COLOR[p.category], r:8+p.score*0.8, category:p.category };
    nodes.push(node); nodeMap[id] = node;
    p.tags.forEach(t => {
      const tagId = "t_"+t.replace(/[^a-zA-Z0-9]/g,'_');
      if (!nodeMap[tagId]) {
        const tn = { id:tagId, type:"tag", label:t, color:NODE_COLOR.tag, r:4+(allTags[t]||1)*0.5, opacity:0.5 };
        nodes.push(tn); nodeMap[tagId] = tn;
      }
      links.push({ source:id, target:tagId });
    });
  });

  // Stats
  document.getElementById('stat-nodes').textContent = pages.length;
  document.getElementById('stat-tags').textContent = Object.keys(allTags).length;
  document.getElementById('stat-links').textContent = links.length;

  // Tag cloud
  const tc = document.getElementById('tag-cloud');
  tc.innerHTML = '';
  Object.entries(allTags).sort((a,b)=>b[1]-a[1]).forEach(([tag,count]) => {
    const el = document.createElement('span');
    el.className = 'tag-pill';
    el.textContent = `${tag} (${count})`;
    el.style.background = `rgba(34,211,238,${Math.min(0.1+count*0.04,0.4)})`;
    el.style.color = '#22d3ee';
    el.style.border = '1px solid rgba(34,211,238,0.25)';
    el.onclick = () => highlightTag(tag);
    tc.appendChild(el);
  });

  // Layout
  nodes.forEach((n,i) => {
    const angle = i * 2 * Math.PI / Math.min(nodes.length, 60);
    const radius = Math.min(W,H) * 0.3 + (n.type === "tag" ? 80 : 0);
    n.x = W/2 + Math.cos(angle) * radius + Math.random()*60-30;
    n.y = H/2 + Math.sin(angle) * radius + Math.random()*60-30;
    n.vx = 0; n.vy = 0;
  });
  simulate(300);
  render();
}

// === Force simulation ===
function simulate(iterations) {
  for (let iter = 0; iter < iterations; iter++) {
    for (let i=0;i<nodes.length;i++) {
      for (let j=i+1;j<nodes.length;j++) {
        let dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
        let dist = Math.sqrt(dx*dx+dy*dy)||1;
        let force = (nodes[i].type==="tag" && nodes[j].type==="tag") ? 200 : 500;
        force /= (dist*dist);
        nodes[i].vx += dx/dist*force; nodes[i].vy += dy/dist*force;
        nodes[j].vx -= dx/dist*force; nodes[j].vy -= dy/dist*force;
      }
    }
    links.forEach(l => {
      const s = nodeMap[l.source], t = nodeMap[l.target];
      if (!s||!t) return;
      let dx = t.x-s.x, dy = t.y-s.y;
      let dist = Math.sqrt(dx*dx+dy*dy)||1;
      let f = (dist-70)*0.02;
      s.vx += dx/dist*f; s.vy += dy/dist*f;
      t.vx -= dx/dist*f; t.vy -= dy/dist*f;
    });
    nodes.forEach(n => {
      n.vx += (W/2-n.x)*0.003; n.vy += (H/2-n.y)*0.003;
      n.x += n.vx*0.5; n.y += n.vy*0.5;
      n.vx *= 0.85; n.vy *= 0.85;
      n.x = Math.max(30, Math.min(W-30, n.x));
      n.y = Math.max(30, Math.min(H-30, n.y));
    });
  }
}

// === Render ===
function render() {
  const filter = currentFilter;
  const searchTerm = document.getElementById('search').value.toLowerCase().trim();
  svgEl.innerHTML = '';

  // Apply transform group
  const gWrap = document.createElementNS('http://www.w3.org/2000/svg','g');
  gWrap.setAttribute('transform', `translate(${panX},${panY}) scale(${zoom})`);
  svgEl.appendChild(gWrap);

  // Links
  const visibleLinks = [];
  links.forEach(l => {
    const s = nodeMap[l.source], t = nodeMap[l.target];
    if (!s||!t) return;
    if (filter && s.type === "page" && s.category !== filter) return;
    if (filter && t.type === "page" && t.category !== filter) return;
    visibleLinks.push({l, s, t});
  });

  visibleLinks.forEach(({l,s,t}) => {
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',s.x); line.setAttribute('y1',s.y);
    line.setAttribute('x2',t.x); line.setAttribute('y2',t.y);
    line.setAttribute('class','link');
    line.id = `link-${l.source}-${l.target}`;
    if (searchTerm) {
      const match = (s.label||'').toLowerCase().includes(searchTerm) || (t.label||'').toLowerCase().includes(searchTerm);
      line.classList.add(match ? 'highlight' : 'dimmed');
    }
    gWrap.appendChild(line);
  });

  // Nodes
  nodes.forEach(n => {
    if (filter && n.type === "page" && n.category !== filter) return;
    if (filter && n.type === "tag") {
      const has = visibleLinks.some(l => (l.l.source===n.id || l.l.target===n.id));
      if (!has) return;
    }
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','node');
    g.setAttribute('transform',`translate(${n.x},${n.y})`);

    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('r', Math.max(3, n.r||6));
    c.setAttribute('fill', n.color);
    c.setAttribute('opacity', n.opacity||0.9);
    c.setAttribute('stroke', n.type==="page"?'#0a0e1a':'transparent');
    c.setAttribute('stroke-width','1.5');
    g.appendChild(c);

    // Labels: show for pages and important tags
    if (n.type === "page" || (n.type === "tag" && n.r > 7)) {
      const text = document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('class','node-label');
      text.setAttribute('y', -(n.r||6) - 4);
      text.textContent = n.label.length > 22 ? n.label.substring(0,20)+'..' : n.label;
      if (searchTerm && !n.label.toLowerCase().includes(searchTerm)) {
        text.classList.add('dimmed');
        g.classList.add('dimmed');
      }
      g.appendChild(text);
    }

    g.onclick = (e) => {
      e.stopPropagation();
      if (n.type === "page") showDetail(n.page);
      else highlightTag(n.label);
    };

    // Drag
    let dragging = false, startX, startY;
    g.onmousedown = (e) => {
      dragging = true; startX = e.clientX; startY = e.clientY;
      e.preventDefault(); e.stopPropagation();
    };
    document.onmousemove = (e) => {
      if (dragging) {
        const rect = svgEl.getBoundingClientRect();
        n.x = (e.clientX - rect.left - panX) / zoom;
        n.y = (e.clientY - rect.top - panY) / zoom;
        simulate(5);
        render();
      } else if (panning) {
        panX = e.clientX - panStartX;
        panY = e.clientY - panStartY;
        render();
      }
    };
    document.onmouseup = () => { dragging = false; panning = false; };

    gWrap.appendChild(g);
  });
}

// === Detail panel ===
function showDetail(p) {
  document.getElementById('d-title').textContent = p.title.replace(/-/g,' ');
  document.getElementById('d-meta').innerHTML = `类型: <b style="color:${NODE_COLOR[p.category]}">${p.category}</b> · 评分: <b>${p.score}/10</b><br>路径: <code>${p.path}</code>`;
  document.getElementById('d-tags').innerHTML = p.tags.map(t=>`<span class="tag-s" style="color:#22d3ee">#${t}</span>`).join('');
  document.getElementById('d-summary').textContent = p.summary || '';
  document.getElementById('detail').classList.add('open');
}

// === Highlight tag ===
function highlightTag(tag) {
  document.querySelectorAll('.link').forEach(l => l.classList.remove('highlight'));
  links.forEach(l => {
    const t = nodeMap[l.target];
    if (t && t.label === tag) {
      const el = document.getElementById(`link-${l.source}-${l.target}`);
      if (el) el.classList.add('highlight');
    }
  });
}

// === Zoom & Pan ===
let panning = false, panStartX = 0, panStartY = 0;

svgEl = document.getElementById('svg');
W = document.getElementById('graph').clientWidth;
H = document.getElementById('graph').clientHeight;
svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);

svgEl.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = Math.max(0.2, Math.min(5, zoom * delta));
  // Zoom toward mouse position
  const rect = svgEl.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (newZoom / zoom);
  panY = my - (my - panY) * (newZoom / zoom);
  zoom = newZoom;
  render();
  updateStatus();
});

svgEl.addEventListener('mousedown', (e) => {
  if (e.target === svgEl || e.target.tagName === 'svg') {
    panning = true; panStartX = e.clientX - panX; panStartY = e.clientY - panY;
  }
});

document.getElementById('zoom-in').onclick = () => { zoom = Math.min(5, zoom*1.2); render(); updateStatus(); };
document.getElementById('zoom-out').onclick = () => { zoom = Math.max(0.2, zoom*0.8); render(); updateStatus(); };
document.getElementById('zoom-reset').onclick = () => { zoom = 1; panX = 0; panY = 0; render(); updateStatus(); };

function updateStatus() { document.getElementById('status').textContent = `缩放: ${zoom.toFixed(1)}x`; }

// === Search ===
document.getElementById('search').oninput = () => render();

// === Filter buttons ===
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('#controls .btn, #sidebar .btn').forEach(b => b.classList.remove('active'));
  const id = f==='entities'?'btn-entities':f==='sources'?'btn-sources':'btn-all';
  document.getElementById(id).classList.add('active');
  render();
}
document.getElementById('btn-all').onclick = () => setFilter(null);
document.getElementById('btn-entities').onclick = () => setFilter('entities');
document.getElementById('btn-sources').onclick = () => setFilter('sources');

// === Init ===
(async () => {
  try {
    document.getElementById('loading').textContent = '⏳ 从 MCP 加载知识库...';
    const pages = await fetchPages();
    if (pages && pages.length > 0) {
      document.getElementById('loading').style.display = 'none';
      buildGraph(pages);
      document.getElementById('status').textContent = `✅ ${pages.length} 条知识 · 实时数据`;
    } else {
      throw new Error('MCP 返回空');
    }
  } catch (err) {
    console.log('MCP fetch failed, using fallback:', err.message);
    document.getElementById('loading').textContent = '⚠️ MCP 不可达，使用内置数据';
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      buildGraph(FALLBACK_PAGES);
      document.getElementById('status').textContent = `⚠️ 离线模式 · ${FALLBACK_PAGES.length} 条`;
    }, 800);
  }
})();
</script>
