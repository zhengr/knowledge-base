name: Knowledge Collect (daily)

on:
  schedule:
    # 每天 UTC 16:00（北京时间 00:00）采集知识源
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect (GitHub + AI news RSS + arXiv, free, no LLM)
        run: python scripts/collect.py

      - name: Commit & push raw inbox
        run: |
          git config user.name "kb-bot"
          git config user.email "kb-bot@users.noreply.github.com"
          git add raw/
          if git diff --cached --quiet; then
            echo "无变更，跳过提交"
          else
            git commit -m "auto: daily collect $(date -u +%Y-%m-%d)"
            git push
          fi
