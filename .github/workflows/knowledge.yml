name: Knowledge Build (collect + distill)

on:
  schedule:
    # 每天 UTC 16:00（北京时间 00:00）自动构建知识库
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-knowledge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect (GitHub + arXiv, free)
        run: python scripts/collect.py

      - name: Distill (LLM → wiki pages)
        env:
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: python scripts/distill.py

      - name: Commit & push
        run: |
          git config user.name "kb-bot"
          git config user.email "kb-bot@users.noreply.github.com"
          git add raw/ wiki/
          if git diff --cached --quiet; then
            echo "无变更，跳过提交"
          else
            git commit -m "auto: daily knowledge build $(date -u +%Y-%m-%d)"
            git push
          fi
